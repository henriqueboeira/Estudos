<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 300px;
            height: 200px;
            border-collapse: collapse;
            text-align: center;
        }
        td{
            border: 1px solid black;
            
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td colspan="2">A</td>
            <td rowspan="3">B</td>
            
        </tr>
        <tr>
            <td>E</td>
            <td>F</td>
        </tr>
        <tr>
            <td>H</td>
            <td>I</td>
        </tr>
    </table>
</body>
</html>
