<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modelo de caixas</title>
    <style>
        h1{
            background-color: rgb(206, 204, 204) ;
            height:300px ;
            width: 300px;
            
            border: 10px solid darkslategray;

            padding: 10px;

            margin: 20px auto 40px auto;

            outline: 5px dashed salmon;
        }

        a{
            border-width: 10px;
            border-style: solid;
            border-color: red;
        }

      
    </style>
</head>
<body>
    <h1>exemplo de caixas</h1>
    <p>parágrafos também são exemplos de boxx-level, mas os <a href="#"> links são caixas de inline-level</a>. vamos ver como tudo funciona</p>
</body>
</html>
