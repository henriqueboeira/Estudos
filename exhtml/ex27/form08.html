<head>

<body>
    <h1>exemplo de formulario</h1>

    <form action="cadastro.py" method="get">
        <p>
            <label for="in1">Numero 1:</label>
            <input type="number" name="n1" id="in1" min="0" max="50" required oninput="soma.innerHTML = Number(n1.value) + Number(n2.value)">
        </p>
        <p>
            <label for="n2"> Número 2:</label>
            <input type="number" name="n2" id="1n2" min="0" max="50" required oninput="soma.innerHTML = Number(n1.value) + Number(n2.value)">
        </p>
        <p>
            <label for="soma">Soma:</label>
            <output name="soma" id="soma">0</output>
        </p>

          <p>
        <input type="submit" value="Enviar">
        <input type="reset" value="Apagar">
        </p>
    </form>

  
</body>
