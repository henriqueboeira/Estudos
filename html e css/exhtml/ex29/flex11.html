<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <style>
        .conteiner{
            background-color: rgb(245, 142, 124);

            display: flex;
            flex-direction: row;
        }

        .item{
            background-color: rgb(102, 238, 238);
            border: 1px solid black;
            text-align: center;
        }

        #a{
            flex-basis: 200px;
            flex-shrink: 1;
            flex-grow: 1;
        }

        #b{
            flex-basis: 200px;
            flex-shrink: 2;
            flex-grow: 2;
        }

        #c{
            flex-basis: 200px;
            flex-shrink: 3;
            flex-grow: 3;
        }


    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item" id="a">a</div>
        <div class="item" id="b">b</div>
        <div class="item" id="c">c</div>
    </div>
</body>
</html>
