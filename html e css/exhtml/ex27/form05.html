<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1>formularios</h1>
    <form action="cadastro.py" method="post">
        <fieldset>
            <legend>sexo</legend>
            <input type="radio" name="sexo" id="msexo">
            <label for="msexo">Masculino</label>
            <input type="radio" name="sexo" id="fsexo" checked>
            <label for="fsexo">Feminino</label>  
        </fieldset>

        <fieldset>
            <legend>esportes favoritos</legend>
            <input type="checkbox" name="fut" id="fut">
            <label for="fut">Futebol</label>
            <input type="checkbox" name="fut" id="Basq" checked>
            <label for="basq">Basquete</label>
            <input type="checkbox" name="vol" id="vol" checked>
            <label for="vol">Volei</label>
            <input type="checkbox" name="ten" id="ten">
            <label for="ten">Tenis</label>
        </fieldset>
    </form>
</body>
</html>
