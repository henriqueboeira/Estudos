<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
</head>
<body>
    <h1>meu primeiro formulario</h1>
    <form action="cadastro.py">
         <p><label for="n">Nome:</label> 
            <input type="text" name="nome" id="n" autocomplete="off" maxlength="8" placeholder="digite seu nome!">
        </p>
         <p><label for="sn">Sobrenome:</label>
            <input type="text" name="sobrenome" id="sn" placeholder="digite seu sobrenome!">
        </p>
         <input type="submit" value="enviar">
    </form>
</body>
</html>
