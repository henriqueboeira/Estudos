<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="cadastro.py" method="get"> 
        <p>
            <label for="icolor">Escolha uma cor</label>
            <input type="color" name="color" id="icolor" value="#fff03d">
        </p>
        <p>
            <label for="file"> Enviar Arquivo</label>
            <input type="file" name="file" id="file">
        </p>
        <p>
            <label for="r"> Nota</label>
            <input type="range" name="r" id="r" min="0" max="4">
        </p>
    </form>
</body>
</html>
